name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone turbovec dependency
        run: git clone https://github.com/RyanCodrai/turbovec.git ../turbovec

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --release -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release
